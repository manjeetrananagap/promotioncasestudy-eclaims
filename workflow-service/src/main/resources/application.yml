server:
  port: 8085

spring:
  application:
    name: workflow-service
  datasource:
    url: jdbc:postgresql://localhost:5432/workflow_db
    username: eclaims
    password: eclaims_pass
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      group-id: workflow-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.nagarro.eclaims.events"

zeebe:
  client:
    broker:
      gatewayAddress: localhost:26500
    security:
      plaintext: true
    worker:
      defaultName: workflow-worker
      defaultType: workflow
      threads: 4

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.nagarro.eclaims: DEBUG
    io.camunda.zeebe: INFO
