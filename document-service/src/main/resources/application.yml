# =============================================================================
# eClaims — Document Service Configuration
# Port: 8083
# =============================================================================

server:
  port: 8083
  servlet:
    context-path: /api/v1

spring:
  application:
    name: document-service

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  datasource:
    url: jdbc:postgresql://localhost:5432/document_db
    username: eclaims
    password: eclaims_dev_2024
    hikari:
      pool-name: DocumentHikariPool
      maximum-pool-size: 5

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: document-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.nagarro.eclaims.events"

  # Max upload file size — 20 MB per file
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/eclaims

# MinIO connection
eclaims:
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-documents: eclaims-documents
    bucket-photos:    eclaims-photos
    bucket-reports:   eclaims-reports
  kafka:
    topics:
      audit-events: audit.events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway

logging:
  level:
    com.nagarro.eclaims: DEBUG
