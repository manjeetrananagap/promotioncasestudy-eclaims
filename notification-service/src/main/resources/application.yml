server:
  port: 8082
  servlet:
    context-path: /api/v1

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: eclaims
    password: eclaims_dev_2024
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: NotificationPool
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.nagarro.eclaims.events"
        spring.json.use.type.headers: false

  # SMTP — points to Mailhog in local dev
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  eclaims:
    mail:
      from: noreply@eclaims.yourdomain.com
      from-name: eClaims Nagarro

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.nagarro.eclaims: DEBUG
    org.springframework.kafka: INFO
