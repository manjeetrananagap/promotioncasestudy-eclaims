# notification-service, document-service, partner-service, workflow-service, api-gateway, frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: eclaims
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: notification-service
          image: REGISTRY/eclaims/notification-service:IMAGE_TAG
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5432/notification_db"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eclaims-db-secret
                  key: password
          envFrom:
            - configMapRef:
                name: eclaims-config
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8082 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: eclaims
spec:
  selector:
    app: notification-service
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
