steps:
  # Build all Java services with parent POM
  - name: 'gcr.io/cloud-builders/mvn'
    args: ['package', '-DskipTests']

  # Build Docker images for each service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/claims-service:$SHORT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/claims-service:latest'
      - './claims-service/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/notification-service:$SHORT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/notification-service:latest'
      - './notification-service/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/document-service:$SHORT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/document-service:latest'
      - './document-service/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/partner-service:$SHORT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/partner-service:latest'
      - './partner-service/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/api-gateway:$SHORT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/api-gateway:latest'
      - './api-gateway/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/workflow-service:$SHORT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/workflow-service:latest'
      - './workflow-service/'

  # Push all images using --all-tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/claims-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/notification-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/document-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/partner-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/api-gateway']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/workflow-service']

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/claims-service:$SHORT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/notification-service:$SHORT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/document-service:$SHORT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/partner-service:$SHORT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/api-gateway:$SHORT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/eclaims/workflow-service:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'

substitutions:
  _REGION: 'us-central1'