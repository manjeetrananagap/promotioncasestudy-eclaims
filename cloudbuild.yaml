steps:
  # Build all Java services with parent POM
  - name: 'gcr.io/cloud-builders/mvn'
    args: ['package', '-DskipTests']

  # Build Docker images for each service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/claims-service:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/claims-service:latest'
      - './claims-service/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/notification-service:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/notification-service:latest'
      - './notification-service/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/document-service:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/document-service:latest'
      - './document-service/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/partner-service:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/partner-service:latest'
      - './partner-service/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/api-gateway:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/api-gateway:latest'
      - './api-gateway/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/workflow-service:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/workflow-service:latest'
      - './workflow-service/'

  # Push all images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/claims-service:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/claims-service:latest']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/notification-service:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/notification-service:latest']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/document-service:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/document-service:latest']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/partner-service:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/partner-service:latest']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/api-gateway:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/api-gateway:latest']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/workflow-service:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/workflow-service:latest']

images:
  - 'gcr.io/$PROJECT_ID/claims-service:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/notification-service:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/document-service:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/partner-service:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/api-gateway:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/workflow-service:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'

substitutions:
  _REGION: 'us-central1'