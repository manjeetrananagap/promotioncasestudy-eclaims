steps:
  - name: 'gcr.io/cloud-builders/mvn'
    args: ['package']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/PROJECT_ID/microservice-a'
      - './microservice-a/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/PROJECT_ID/microservice-b'
      - './microservice-b/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/PROJECT_ID/microservice-c'
      - './microservice-c/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/PROJECT_ID/microservice-a'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/PROJECT_ID/microservice-b'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/PROJECT_ID/microservice-c'

  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'set'
      - 'image'
      - 'deployment/microservice-a'
      - 'microservice-a=gcr.io/PROJECT_ID/microservice-a'

  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'set'
      - 'image'
      - 'deployment/microservice-b'
      - 'microservice-b=gcr.io/PROJECT_ID/microservice-b'

  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'set'
      - 'image'
      - 'deployment/microservice-c'
      - 'microservice-c=gcr.io/PROJECT_ID/microservice-c'

options:
  logging: 'CLOUD_LOGGING_ONLY'

substitutions:
  _REGION: 'us-central1'
  _PROJECT_ID: 'your-project-id'